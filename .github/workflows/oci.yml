name: Run OCI Token Exchange

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-oci:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4.0.3
        with:
          node-version: "24"

      - name: Install OCI CLI
        shell: bash
        run: |
          set -euo pipefail
          bash -c "$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh)" -- --accept-all-defaults
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Debug GitHub OIDC token claims
        shell: bash
        run: |
          set -euo pipefail
          TOKEN_JSON="$(curl -sS \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://cloud.oracle.com")"
          JWT="$(echo "$TOKEN_JSON" | jq -r '.value')"
          echo "$JWT" | cut -d'.' -f2 | base64 -d 2>/dev/null | jq .

      - name: Exchange GitHub OIDC token for OCI session token
        uses: gtrevorrow/oci-token-exchange-action@v1
        with:
          oidc_client_identifier: ${{ secrets.OIDC_CLIENT_IDENTIFIER }}
          domain_base_url: ${{ secrets.DOMAIN_BASE_URL }}
          oci_tenancy: ${{ secrets.OCI_TENANCY }}
          oci_region: ${{ secrets.OCI_REGION }}
          oci_profile: DEFAULT

      - name: Verify OCI auth
        shell: bash
        run: |
          set -euo pipefail
          oci --auth security_token --profile DEFAULT os ns get

      - name: Example OCI command
        shell: bash
        run: |
          set -euo pipefail
          oci --auth security_token --profile DEFAULT iam region-subscription list --tenancy-id "${{ secrets.OCI_TENANCY }}"
