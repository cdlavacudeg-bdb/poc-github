name: Run OCI Token Exchange

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-oci:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4.0.3
        with:
          node-version: "24"

      - name: Install OCI CLI
        shell: bash
        run: |
          set -euo pipefail
          bash -c "$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh)" -- --accept-all-defaults
          echo "$HOME/bin" >> "$GITHUB_PATH"
      - name: Setup OCI CLI with OIDC Token Exchange (npm Package)
        script:
          # Setup OCI CLI
          - curl -LO https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh
          - bash install.sh --accept-all-defaults
          - export PATH=$PATH:/root/bin
          
          # Install the token exchange CLI from npm
          - npm install -g @gtrevorrow/oci-token-exchange
          
          # Run the installed CLI for token exchange
          - >
            export PLATFORM=bitbucket &&
            export OIDC_CLIENT_IDENTIFIER=${{ secrets.OIDC_CLIENT_IDENTIFIER }} &&
            export DOMAIN_BASE_URL=${{ secrets.DOMAIN_BASE_URL }} &&
            export OCI_TENANCY=${{ secrets.OCI_TENANCY }} &&
            export OCI_REGION=${{ secrets.OCI_REGION }} &&
            export RETRY_COUNT=3
            export DEBUG=true
          - oci-token-exchange || exit 1

      - name: Exchange GitHub OIDC token for OCI session token
        uses: gtrevorrow/oci-token-exchange-action@latest
        env:
          DEBUG: true
        with:
          oidc_client_identifier: ${{ secrets.OIDC_CLIENT_IDENTIFIER }}
          domain_base_url: ${{ secrets.DOMAIN_BASE_URL }}
          oci_tenancy: ${{ secrets.OCI_TENANCY }}
          oci_region: ${{ secrets.OCI_REGION }}
          oci_profile: DEFAULT

      - name: Verify OCI auth
        shell: bash
        run: |
          set -euo pipefail
          oci --auth security_token --profile DEFAULT os ns get

      - name: Example OCI command
        shell: bash
        run: |
          set -euo pipefail
          oci --auth security_token --profile DEFAULT iam region-subscription list --tenancy-id "${{ secrets.OCI_TENANCY }}"
